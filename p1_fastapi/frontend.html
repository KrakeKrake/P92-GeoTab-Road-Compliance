<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>P1 Vehicle Classifier</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 30px auto; line-height: 1.4; }
    .box { border: 1px solid #ccc; padding: 16px; margin-bottom: 16px; border-radius: 8px; }
    label { display: block; margin-top: 10px; }
    select, input, button, textarea { width: 100%; padding: 8px; margin-top: 4px; }
    button { cursor: pointer; }
    pre { background: #f6f6f6; padding: 12px; overflow: auto; }
  </style>
</head>
<body>
  <h1>P1 Vehicle Classifier</h1>

  <div class="box">
    <h2>1. Category</h2>
    <select id="categorySelect">
      <option value="">Loading categories...</option>
    </select>
  </div>

  <div class="box">
    <h2>2. Profile</h2>
    <select id="profileSelect" disabled>
      <option value="">Choose a category first</option>
    </select>
  </div>

  <div class="box">
    <h2>3. Profile Details</h2>
    <pre id="profileDetails">No profile selected.</pre>
  </div>

  <div class="box">
    <h2>4. Classification Input</h2>

    <label>
      Use custom dimensions?
      <select id="customDimensions">
        <option value="false">No</option>
        <option value="true">Yes</option>
      </select>
    </label>

    <div id="dimensionFields" style="display:none;">
      <label>Overall width (m)
        <input id="overall_width_m" type="number" step="0.1" />
      </label>
      <label>Overall height (m)
        <input id="overall_height_m" type="number" step="0.1" />
      </label>
      <label>Overall length (m)
        <input id="overall_length_m" type="number" step="0.1" />
      </label>
    </div>

    <div id="extraFields"></div>

    <button id="classifyBtn">Classify</button>
  </div>

  <div class="box">
    <h2>5. Result</h2>
    <pre id="resultBox">No result yet.</pre>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";

    const categorySelect = document.getElementById("categorySelect");
    const profileSelect = document.getElementById("profileSelect");
    const profileDetails = document.getElementById("profileDetails");
    const customDimensions = document.getElementById("customDimensions");
    const dimensionFields = document.getElementById("dimensionFields");
    const extraFields = document.getElementById("extraFields");
    const resultBox = document.getElementById("resultBox");
    let currentProfile = null;
    let currentTemplate = null;

    customDimensions.addEventListener("change", () => {
      dimensionFields.style.display =
        customDimensions.value === "true" ? "block" : "none";
    });

    async function loadCategories() {
      const res = await fetch(`${API_BASE}/categories`);
      const data = await res.json();

      categorySelect.innerHTML = `<option value="">Select a category</option>`;
      for (const category of data) {
        const option = document.createElement("option");
        option.value = category.id;
        option.textContent = category.label;
        categorySelect.appendChild(option);
      }
    }

    async function loadProfiles(categoryId) {
      const res = await fetch(`${API_BASE}/categories/${categoryId}`);
      const data = await res.json();

      profileSelect.disabled = false;
      profileSelect.innerHTML = `<option value="">Select a profile</option>`;

      for (const profile of data.profiles) {
        const option = document.createElement("option");
        option.value = profile.profile_id;
        option.textContent = profile.display_name;
        profileSelect.appendChild(option);
      }
    }

    async function loadProfileDetails(profileId) {
      const profileRes = await fetch(`${API_BASE}/profiles/${profileId}`);
      currentProfile = await profileRes.json();

      const templateRes = await fetch(`${API_BASE}/templates/${currentProfile.template_id}`);
      currentTemplate = await templateRes.json();

      profileDetails.textContent = JSON.stringify(
        { profile: currentProfile, template: currentTemplate },
        null,
        2
      );

      renderExtraFields(currentTemplate.extra_questions || []);
    }

    function renderExtraFields(questions) {
      extraFields.innerHTML = "";
      for (const q of questions) {
        const wrapper = document.createElement("div");
        wrapper.innerHTML = `
          <label>${q.label}
            ${q.type === "bool"
              ? `<select id="${q.name}">
                   <option value="">Select</option>
                   <option value="true">True</option>
                   <option value="false">False</option>
                 </select>`
              : `<input id="${q.name}" type="number" step="0.1" />`
            }
          </label>
        `;
        extraFields.appendChild(wrapper);
      }
    }

    function readExtraAnswers() {
      const answers = {};

      if (customDimensions.value === "true") {
        const w = document.getElementById("overall_width_m").value;
        const h = document.getElementById("overall_height_m").value;
        const l = document.getElementById("overall_length_m").value;

        if (w !== "") answers.overall_width_m = Number(w);
        if (h !== "") answers.overall_height_m = Number(h);
        if (l !== "") answers.overall_length_m = Number(l);
      }

      for (const q of (currentTemplate?.extra_questions || [])) {
        const el = document.getElementById(q.name);
        if (!el) continue;

        if (q.type === "bool") {
          if (el.value === "true") answers[q.name] = true;
          if (el.value === "false") answers[q.name] = false;
        } else {
          if (el.value !== "") answers[q.name] = Number(el.value);
        }
      }

      return answers;
    }

    async function classify() {
      if (!currentProfile) {
        resultBox.textContent = "Please select a profile first.";
        return;
      }

      const payload = {
        profile_id: currentProfile.profile_id,
        custom_dimensions: customDimensions.value === "true",
        answers: readExtraAnswers()
      };

      const res = await fetch(`${API_BASE}/classify`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      resultBox.textContent = JSON.stringify(data, null, 2);
    }

    categorySelect.addEventListener("change", async (e) => {
      const categoryId = e.target.value;
      if (!categoryId) return;
      await loadProfiles(categoryId);
    });

    profileSelect.addEventListener("change", async (e) => {
      const profileId = e.target.value;
      if (!profileId) return;
      await loadProfileDetails(profileId);
    });

    document.getElementById("classifyBtn").addEventListener("click", classify);

    loadCategories();
  </script>
</body>
</html>
